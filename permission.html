<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voice Bubble — Microphone setup</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #eef2f8; color: #1a1d23;
    }
    .card {
      max-width: 460px; margin: 24px; padding: 32px;
      background: #ffffff; border: 1px solid #dbe1ea; border-radius: 18px;
      box-shadow: 0 20px 60px rgba(20,30,50,.15);
    }
    .dot {
      width: 56px; height: 56px; border-radius: 50%;
      display: grid; place-items: center; font-size: 26px;
      background: #5b9dff22; border: 1px solid #5b9dff66; margin-bottom: 18px;
    }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { color: #5c6675; line-height: 1.55; margin: 0 0 18px; }
    button {
      appearance: none; border: 0; cursor: pointer;
      background: #5b9dff; color: #fff; font-weight: 600; font-size: 15px;
      padding: 12px 18px; border-radius: 12px;
    }
    button:hover { background: #4a8df0; }
    .status { margin-top: 16px; font-size: 14px; }
    .ok { color: #16a34a; }
    .err { color: #dc2626; }
  </style>
</head>
<body>
  <div class="card">
    <div class="dot"><img src="icons/mic.png" alt="" width="28" height="28"></div>
    <h1>Allow the microphone once</h1>
    <p>
      Voice Bubble needs the microphone to turn speech into text. Grant it here
      once and it will work on every website — no repeated pop-ups.
    </p>
    <button id="grant">Allow microphone</button>
    <div class="status" id="status"></div>
  </div>
  <script src="permission.js"></script>
</body>
</html>
